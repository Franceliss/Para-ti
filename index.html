<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo 2215 🌻</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        .layer { position: fixed; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; text-align: center; }
        .box { display: none; opacity: 0; transition: 1.2s ease; pointer-events: auto; max-width: 85%; }
        .box.visible { display: block; opacity: 1; }

        h1 { font-size: 2.5rem; text-shadow: 0 0 20px #ffeb3b; color: #ffeb3b; margin: 10px 0; }
        p { font-size: 1.2rem; line-height: 1.4; text-shadow: 0 2px 5px #000; }

        .action-btn { background: rgba(0,0,0,0.5); border: 2px solid #ffeb3b; color: #ffeb3b; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 0 15px #ffeb3b; transition: 0.3s; }
        .action-btn:hover { background: #ffeb3b; color: #000; }

        /* 2215 FIJO */
        .tag-2215 { position: fixed; bottom: 30px; left: 30px; font-size: 2rem; z-index: 25; color: white; text-shadow: 0 0 10px #fff; font-family: monospace; }
    </style>
</head>
<body>

    <div class="tag-2215">2215 🤍</div>

    <div class="layer">
        <div id="v1" class="box visible">
            <h1>Flores Amarillas 🌻</h1>
            <p>Un universo creado para ti.</p>
            <button class="action-btn" onclick="toStep(1, 2)">INICIAR VIAJE ✨</button>
        </div>

        <div id="v2" class="box">
            <h1>Eres mi sol... 👑</h1>
            <p>Cada estrella representa un momento <b style="color:#ffeb3b">juntas</b>.</p>
            <button class="action-btn" onclick="toStep(2, 3)">CONTINUAR 🚀</button>
        </div>

        <div id="v3" class="box">
            <div style="background: rgba(0,0,0,0.8); padding: 30px; border-radius: 30px; border: 2px solid #ffeb3b;">
                <h1 style="font-size: 1.8rem;">Te amo mi reina 💜🤍</h1>
                <p>La distancia no me permite darte tus flores hoy, pero este universo es para ti. Nada nos separará jamás.</p>
                <div style="font-size: 3rem; margin: 10px 0;">🌻🌻🌻🌻🌻</div>
                <h2 style="letter-spacing: 10px;">INFINITO</h2>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let s, c, r, stars, code3D;

        function start() {
            s = new THREE.Scene();
            c = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            c.position.z = 100;

            r = new THREE.WebGLRenderer({ antialias: true });
            r.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(r.domElement);

            // GALAXIA DE TIKTOK (CIRCULAR)
            const geo = new THREE.BufferGeometry();
            const positions = [];
            for(let i=0; i<15000; i++) {
                let dist = 30 + Math.random() * 100;
                let ang = Math.random() * Math.PI * 2;
                positions.push(dist * Math.cos(ang), (Math.random()-0.5) * 15, dist * Math.sin(ang));
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffeb3b, size: 0.6, transparent: true, opacity: 0.8 }));
            s.add(stars);

            // NÚCLEO Y ANILLO
            const core = new THREE.Mesh(new THREE.SphereGeometry(12, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffeb3b }));
            s.add(core);
            const hole = new THREE.Mesh(new THREE.SphereGeometry(11.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            s.add(hole);

            // 2215 DENTRO DE LA GALAXIA
            const txtCanvas = document.createElement('canvas');
            const ctx = txtCanvas.getContext('2d');
            txtCanvas.width = 256; txtCanvas.height = 128;
            ctx.fillStyle = "white"; ctx.font = "Bold 60px Arial";
            ctx.fillText("2215 🤍", 20, 80);
            const txtTex = new THREE.CanvasTexture(txtCanvas);
            code3D = new THREE.Sprite(new THREE.SpriteMaterial({ map: txtTex }));
            code3D.scale.set(40, 20, 1);
            code3D.position.set(0, 25, 0); 
            s.add(code3D);

            loop();
        }

        function loop() {
            requestAnimationFrame(loop);
            stars.rotation.y += 0.001;
            code3D.position.y = 25 + Math.sin(Date.now() * 0.002) * 3;
            r.render(s, c);
        }

        function toStep(out, incoming) {
            document.getElementById('v' + out).classList.remove('visible');
            let move = setInterval(() => {
                if(c.position.z > 60) c.position.z -= 1.5;
                else clearInterval(move);
            }, 10);
            setTimeout(() => { document.getElementById('v' + incoming).classList.add('visible'); }, 800);
        }

        start();
        window.addEventListener('resize', () => {
            c.aspect = window.innerWidth / window.innerHeight;
            c.updateProjectionMatrix();
            r.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
