<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaje 2215 🤍</title>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
        background: black;
        color: white;
    }

    /* 2215 arriba */
    #codeTop {
        position: fixed;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 40px;
        font-weight: 800;
        text-shadow: 0 0 20px white;
        z-index: 20;
    }

    /* 2215 abajo */
    #codeBottom {
        position: fixed;
        bottom: 15px;
        left: 15px;
        font-size: 22px;
        opacity: 0.8;
        z-index: 20;
    }

    /* contenedor de pantallas */
    #pantalla {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 900px;
        text-align: center;
        font-size: 28px;
        line-height: 1.5;
        z-index: 20;
        text-shadow: 0 0 15px black;
    }

    /* Botones */
    .btn {
        margin-top: 25px;
        padding: 12px 35px;
        background: rgba(255,255,255,0.15);
        border: 2px solid white;
        border-radius: 8px;
        color: white;
        font-size: 20px;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: .3s;
    }

    .btn:hover {
        background: white;
        color: black;
    }

    /* mensaje final */
    #mensajeFinal {
        display: none;
        font-size: 22px;
        background: rgba(0,0,0,0.55);
        padding: 35px;
        border-radius: 10px;
        line-height: 1.6;
    }
</style>
</head>

<body>

<div id="codeTop">2215 🤍</div>
<div id="codeBottom">2215 🤍</div>

<div id="pantalla">
    <div id="textoPantalla">Misión iniciada… Conexión establecida entre dos almas.</div>
    <button id="btnSiguiente" class="btn">SIGUIENTE</button>
</div>

<!-- audio legal -->
<audio id="musica" preload="auto">
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Loyalty_Freak_Music/SPACE_EXPLORATION/Loyalty_Freak_Music_-_01_-_Deep_Space.mp3" type="audio/mpeg">
</audio>


<!-- SCRIPT GENERAL -->
<script>

//////////////////////////////////////////////////////////////////////////////////////
// GALAXIA 3D – ESTILO INTERSTELLAR
//////////////////////////////////////////////////////////////////////////////////////

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* estrellas */
function crearEstrellas() {
    const geometry = new THREE.BufferGeometry();
    const count = 6000;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 900;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.2
    });

    const estrellas = new THREE.Points(geometry, material);
    scene.add(estrellas);
}

/* agujero negro */
function agujeroNegro() {
    const coreGeo = new THREE.SphereGeometry(4, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    const ringGeo = new THREE.RingGeometry(6, 10, 128);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0xffcc88,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    return ring;
}

crearEstrellas();
let anillo = agujeroNegro();
camera.position.z = 40;

function animar() {
    requestAnimationFrame(animar);
    anillo.rotation.z += 0.004;
    renderer.render(scene, camera);
}
animar();

//////////////////////////////////////////////////////////////////////////////////////
// SISTEMA DE PANTALLAS
//////////////////////////////////////////////////////////////////////////////////////

let index = 0;
let textoFinalMostrado = false;
const musica = document.getElementById("musica");

const pantallas = [
    "Misión iniciada… Conexión establecida entre dos almas.",
    "Activando motores",
    "Saliendo",
    "Aunque estemos lejos… mi destino siempre apunta hacia ti.",
    "La distancia solo prueba lo fuerte que es lo nuestro.",
    "No importa cuántos universos existan… en todos te elegiría a ti.",
    "Tus recuerdos me acompañan más que cualquier estrella.",
    "Cada kilómetro que nos separa… es un motivo más para quedarme contigo.",
    "Tu amor es mi norte, mi ruta, mi 2215.",
    "Prepárate… tu mensaje especial está por llegar."
];

const mensajeFinalTexto = 
`Mami hoy 21 de marzo quería darte tus flores amarillas aunque sea de esta forma ya que la distancia no me permite ir a entregarte nada, sabes que lo que siento por ti va mucho más allá que todo esto, perdón por no poder estar contigo o poder enviarte algo. La distancia no cambia nada solo me hace quererte más y querer estar más contigo. Gracias por quedarte, por seguir ahí, por hacerme sentir que vale la pena. Eres mi persona favorita y no importa dónde estemos, siempre voy a elegirte. Te amo mucho ma🤍🌼`;

const textoPantalla = document.getElementById("textoPantalla");
const btn = document.getElementById("btnSiguiente");
const pantalla = document.getElementById("pantalla");

btn.onclick = () => {

    if (index === 0) {
        musica.currentTime = 3; // empieza desde 0:03
        musica.play();
    }

    index++;

    if (index < pantallas.length) {
        textoPantalla.innerHTML = pantallas[index];
    } 
    
    else if (!textoFinalMostrado) {
        mostrarMensajeFinal();
        textoFinalMostrado = true;
    }
};

//////////////////////////////////////////////////////////////////////////////////////
// MENSAJE FINAL LETRA POR LETRA
//////////////////////////////////////////////////////////////////////////////////////

function mostrarMensajeFinal() {
    pantalla.innerHTML = `<div id="mensajeFinal"></div>`;
    let box = document.getElementById("mensajeFinal");

    let i = 0;
    let velocidad = 35;

    function escribir() {
        if (i < mensajeFinalTexto.length) {
            box.innerHTML += mensajeFinalTexto.charAt(i);
            i++;
            setTimeout(escribir, velocidad);
        }
    }

    escribir();
}

//////////////////////////////////////////////////////////////////////////////////////
// RESPONSIVE
//////////////////////////////////////////////////////////////////////////////////////

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
